<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    @font-face {
        font-family: 'Gyparody';
        src: url('/fonts/gyparody hv.ttf') format('truetype');
    }
    @font-face {
        font-family: 'Korinna';
        src: url('/fonts/ITC Korinna Regular.otf') format('opentype');
    }

    @keyframes cardPopIn {
        0% {
            transform: rotateY(90deg) scale(0.8);
            opacity: 0;
        }
        100% {
            transform: rotateY(0deg) scale(1);
            opacity: 1;
        }
    }

    @keyframes bounceSelect {
        0%   { transform: scale(1); }
        30%  { transform: scale(1.15); }
        60%  { transform: scale(0.95); }
        100% { transform: scale(1); }
    }

    body {
        font-family: 'Korinna';
        margin: 0;
        padding-top: 40px;
        padding-bottom: 120px;
        color: white;
        text-align: center;
        background-color: black;
    }

    #characters {
        display: flex;
        overflow-x: auto;
        gap: 18px;
        padding: 40px 20px;
        align-items: center;
    }

    #characters::-webkit-scrollbar {
        display: none;
    }

    .charCard {
        flex: 0 0 140px;
        scroll-snap-align: center;
        transition: transform 0.3s ease, opacity 0.3s ease;
        opacity: 0.6;
        transform: scale(0.9);
    }

    .charCard.center {
        opacity: 1;
        transform: scale(1.25);
        z-index: 10;
    }

    .cardInner {
        width: 100%;
        aspect-ratio: 3 / 4;
        transition: transform 0.5s ease;
        transform-style: preserve-3d;
    }

    .charCard.selected .cardInner {
        transform: rotateY(180deg);
    }

    .cardFront, .cardBack {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 10px;
        overflow: hidden;
    }

    .cardBack {
        transform: rotateY(180deg);
    }

    .cardFront img,
    .cardBack img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #prevBtn, #nextBtn {
        z-index: 10;
    }
</style>
</head>

<body>

<h1>PA Jeopardy 2026</h1>

<h2>Enter Name</h2>
<input id="name">
<button onclick="setName()">Enter</button>

<h2>Choose Character</h2>

<div style="display:flex; justify-content:center; align-items:center; gap:20px;">
    <button id="prevBtn">&#8592;</button>
    <div id="characters"></div>
    <button id="nextBtn">&#8594;</button>
</div>

<button onclick="joinGame()">Join</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const state = {
    name: "",
    character: null
};

// CHARACTER LIST
socket.on("characterList", (chars) => {
    const container = document.getElementById("characters");
    container.innerHTML = "";

    chars.forEach(char => {
        const btn = document.createElement("button");
        btn.classList.add("charCard");

        const inner = document.createElement("div");
        inner.classList.add("cardInner");

        const front = document.createElement("div");
        front.classList.add("cardFront");

        const back = document.createElement("div");
        back.classList.add("cardBack");

        const imgFront = document.createElement("img");
        imgFront.src = char.front;

        const imgBack = document.createElement("img");
        imgBack.src = char.back;

        front.appendChild(imgFront);
        back.appendChild(imgBack);

        inner.appendChild(front);
        inner.appendChild(back);
        btn.appendChild(inner);

        btn.__charData = char;

        btn.onclick = () => {
            setSelectedCard(btn);
            centerOnCard(btn);
        };

        container.appendChild(btn);
    });

    const cards = Array.from(container.children);
    const cloneCount = 3;

    cards.slice(0, cloneCount).forEach(card => {
        container.appendChild(cloneCard(card));
    });

    cards.slice(-cloneCount).forEach(card => {
        container.insertBefore(cloneCard(card), container.firstChild);
    });

    setTimeout(() => {
        const card = container.querySelector(".charCard");
        const gap = 20;
        const cardWidth = card.offsetWidth + gap;

        container.scrollLeft = cardWidth * cloneCount;
        updateCenterCard();
    }, 100);
});

// CAROUSEL
window.onload = () => {
    const container = document.getElementById("characters");

    document.getElementById("nextBtn").onclick = () => scrollByCard(1);
    document.getElementById("prevBtn").onclick = () => scrollByCard(-1);

    container.addEventListener("scroll", () => {
        const card = container.querySelector(".charCard");
        if (!card) return;

        const gap = 20;
        const cardWidth = card.offsetWidth + gap;
        const totalCards = container.children.length;
        const cloneCount = 3;

        if (container.scrollLeft < cardWidth) {
            container.scrollLeft = cardWidth * (totalCards - cloneCount * 2);
        }

        if (container.scrollLeft > cardWidth * (totalCards - cloneCount)) {
            container.scrollLeft = cardWidth * cloneCount;
        }

        updateCenterCard();
    });
};

// FUNCTIONS
function setName() {
    const input = document.getElementById("name");
    state.name = input.value.trim();
    input.value = "";
}

function setSelectedCard(card) {
    document.querySelectorAll(".charCard")
        .forEach(c => c.classList.remove("selected"));

    card.classList.add("selected");
    state.character = card.__charData;
}

function cloneCard(original) {
    const clone = original.cloneNode(true);
    clone.__charData = original.__charData;

    clone.onclick = () => {
        setSelectedCard(clone);
        centerOnCard(clone);
    };

    return clone;
}

function centerOnCard(card) {
    const container = document.getElementById("characters");

    const containerRect = container.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();

    const offset =
        (cardRect.left + cardRect.width / 2) -
        (containerRect.left + containerRect.width / 2);

    container.scrollBy({
        left: offset,
        behavior: "smooth"
    });
}

function updateCenterCard() {
    const cards = document.querySelectorAll(".charCard");
    const container = document.getElementById("characters");

    const centerX = container.scrollLeft + container.offsetWidth / 2;

    let closest = null;
    let closestDistance = Infinity;

    cards.forEach(card => {
        const cardCenter = card.offsetLeft + card.offsetWidth / 2;
        const distance = Math.abs(centerX - cardCenter);

        if (distance < closestDistance) {
            closestDistance = distance;
            closest = card;
        }
    });

    cards.forEach(c => c.classList.remove("center"));

    if (closest) {
        closest.classList.add("center");
    }
}

function scrollByCard(direction) {
    const container = document.getElementById("characters");
    const card = container.querySelector(".charCard");

    if (!card) return;

    const gap = 20;
    const cardWidth = card.offsetWidth + gap;

    container.scrollBy({
        left: direction * cardWidth,
        behavior: "smooth"
    });
}

function joinGame() {
    socket.emit("join", {
        name: state.name,
        character: state.character.name
    });
}
</script>

</body>
</html>
