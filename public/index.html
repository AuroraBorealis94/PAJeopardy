<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    @font-face {
        font-family: 'Gyparody';
        src: url('/fonts/gyparody hv.ttf') format('truetype');
    }
    @font-face {
        font-family: 'Korinna';
        src: url('/fonts/ITC Korinna Regular.otf') format('opentype');
    }

    @keyframes cardPopIn {
        0% {
            transform: rotateY(90deg) scale(0.8);
            opacity: 0;
        }
        100% {
            transform: rotateY(0deg) scale(1);
            opacity: 1;
        }
    }

    @keyframes bounceSelect {
        0%   { transform: scale(1); }
        30%  { transform: scale(1.15); }
        60%  { transform: scale(0.95); }
        100% { transform: scale(1); }
    }

    h1 {
        font-family: 'Gyparody';
    }

    #h11 {
        background: linear-gradient(
            45deg,
            #a8a8a8,
            #ffffff,
            #ffffff,
            #a8a8a8
        );

        text-shadow: 0 0 10px rgba(255,255,255,0.2);

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        background-clip: text;
    }

    #h12 {
        background: linear-gradient(
            45deg,
            #ff9139,
            #ffe739,
            #ff9139,
            #ffcb39
        );

        text-shadow: 0 0 10px rgba(255,255,255,0.2);

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        background-clip: text;
    }

    h2 {
        font-family: 'Korinna';
        font-size: 20px;
        text-transform: uppercase;
        padding-top: 50px;
    }

    body {
        font-family: 'Korinna';
        font-size: 16px;
        margin: 0;
        padding-top: 40px;
        padding-bottom: 120px;
        color: white;
        text-align: center;

        background-color: #000000;

        background-image: 
            url('/backgrounds/BgTop.png'),
            url('/backgrounds/BgBottom.png');

        background-repeat: 
            no-repeat,
            no-repeat;

        background-position: 
            top center,
            bottom center;

        background-size: 
            100% auto,
            100% auto;
    }

    #characters {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 160px));
        /*grid-template-columns: repeat(auto-fill, 140px);*/
        gap: 10px;
        max-width: 1000px;
        margin: auto;
    }

    #characters button {
        font-family: 'Korinna', serif;
        /*background: white;
        border: 1px solid #ccc;
        border-radius: 8px;*/
        position: relative;
        overflow: hidden;

        background: black;
        border: 2px solid #ccc;
        border-radius: 10px;

        padding: 0;
        cursor: pointer;
        /*display: flex;
        flex-direction: column;
        align-items: center*/
    }

    .charCard {
        perspective: 800px;
        border: none;
        background: transparent;
        padding: 0;
        transition: transform 0.15s ease;
    }

    .cardInner {
        /*height: 100%;*/
        /*position: absolute;*/
        width: 100%;
        aspect-ratio: 3 / 4;
        transition: transform 0.5s ease;
        transform-style: preserve-3d;
    }

    .charCard.selected .cardInner {
        transform: rotateY(180deg);
    }

    .cardFront, .cardBack {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        object-fit: cover;
        border-radius: 10px;
        overflow: hidden;
    }

    .cardFront img,
    .cardBack img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .cardBack {
        transform: rotateY(180deg);
    }

    /* Name overlay (front side) */
    .charName {
        position: absolute;
        bottom: 0;
        width: 100%;

        font-family: 'Korinna', serif;
        color: white;
        font-size: 14px;

        background: rgba(0,0,0,0.6);
    }
    
    .charCard:hover {
        transform: scale(1.05);
        transition: transform 0.15s;
    }

    .charCard:hover .cardFront img {
        transform: scale(1.1);
        transition: transform 0.2s;
    }

    .charCard:active {
        transform: scale(0.95);
    }

    .charCard.selected {
        animation: bounceSelect 0.3s ease;
        /*background: lightgreen;
        border: 2px solid limegreen;
        box-shadow: 0 0 15px limegreen;*/
    }

    #preview {
        font-family: 'Korinna';
        font-size: 18px;
        text-transform: uppercase;
    }

    #previewCharacterBox {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }

    #previewImage {
        /*height: 70PX;*/
        width: 120px;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        display: none;
    }

    #joinBtn {
        font-family: 'Korinna', serif;

        font-size: 24px;
        padding: 15px 40px;

        background: linear-gradient(135deg, #ffcc00, #ff6600);
        color: black;

        border: none;
        border-radius: 12px;

        cursor: pointer;

        box-shadow: 0 0 15px rgba(255, 140, 0, 0.6);

        transition: all 0.2s ease;
    }

    #joinBtn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(255, 140, 0, 0.9);
    }

    #joinBtn:active {
        transform: scale(0.98);
    }

    #joinBtn:disabled {
        background: gray;
        transform: none;
        box-shadow: none;
    }

</style>

    <title>Jeopardy Lobby</title>
</head>
<body>

<!--<br><br><br>-->
<h1 id="h11" style="padding-top: 50px;">PA Jeopardy</h1>
<h1 id="h12" style="font-size: 35px; padding-bottom: 20px;">2026 Edition</h1>

<br>

<!-- ENTER NAME -->
<h2 style="padding-top: 80px;">Choose Your Team Name</h2>
<input id="name" placeholder="Enter group name">


<button id="enterBtn" onclick="setName()">Enter</button>

<br>

<!-- ENTER CHARACTER -->
<h2>Choose Your Team Representative</h2>
<div id="characters"></div>

<br><br>

<!-- PREVIEW -->
<div id="preview">
    <p id="teamLabel" style="display:none;"><b>Team </b><span id="previewName">---</span></p>

    <!--<p><b>Character:</b></p>-->
    <div id="previewCharacterBox">
        <img id="previewImage" src="" />
        <div id="previewCharacterText">---</div>
    </div>
</div>

<br><br>

<!-- JOIN - LOCK IN PLAYER -->
<button id="joinBtn" onclick="joinGame()">Join Game</button>

<hr>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const state = {
    name: "",
    character: null
};

// ROOM CODE
socket.on("roomCode", (code) => {
    document.getElementById("roomCode").textContent = code;
});

// CHARACTER LIST
socket.on("characterList", (chars) => {
    const container = document.getElementById("characters");
    container.innerHTML = "";

    chars.forEach(char => {
        const btn = document.createElement("button");
        // FOR CARD FLIP
        btn.classList.add("charCard");
        // CARD POP ENTER
        btn.style.animation = "cardPopIn 0.5s ease";

        // FOR CARD FLIP
        const inner = document.createElement("div");
        inner.classList.add("cardInner");

        const front = document.createElement("div");
        front.classList.add("cardFront");

        const back = document.createElement("div");
        back.classList.add("cardBack");

        // FRONT IMAGE
        const imgFront = document.createElement("img");
        imgFront.src = char.front;

        // BACK IMAGE (you can customize this later)
        const imgBack = document.createElement("img");
        imgBack.src = char.back; // or different image later

        // NAME LABEL (on both sides optional)
        const label = document.createElement("div");
        label.classList.add("charName");
        label.textContent = char.name;

        front.appendChild(imgFront);
        front.appendChild(label);

        back.appendChild(imgBack);

        inner.appendChild(front);
        inner.appendChild(back);
        btn.appendChild(inner);

        btn.onclick = () => {
            state.character = char;

            // CLEAR BUTTON SELECTION
            //document.querySelectorAll("#characters button")
            //    .forEach(b => b.classList.remove("selected"));

            document.querySelectorAll(".charCard")
                .forEach(b => b.classList.remove("selected"));

            // ADD SELECTION TO CLICKED BTN
            btn.classList.add("selected");

            updatePreview();
        };

        container.appendChild(btn);
    });
});

// SET NAME
function setName() {
    const nameInput = document.getElementById("name");

    state.name = nameInput.value.trim();

    document.getElementById("teamLabel").style.display = "block";

    updatePreview();

    nameInput.value = "";
}

// JOIN GAME - LOCK IN PLAYER
function joinGame() {
    if (!state.name) {
        alert("Please enter your team name first");
        return;
    }

    if (!state.character) {
        alert("Please choose a character");
        return;
    }

    const joinBtn = document.getElementById("joinBtn");
    joinBtn.disabled = true;
    joinBtn.innerText = "Joined!";
    joinBtn.style.opacity = "0.6";
    joinBtn.style.cursor = "not-allowed";

    confettiBurst();

    socket.emit("join", {
        name: state.name,
        character: state.character.name
    });

    // LOCK UI AFTER JOINING
    document.getElementById("name").disabled = true;

    document.querySelectorAll("#characters button")
    .forEach(b => {
        b.disabled = true;
        b.style.pointerEvents = "none";
    });

    // DISABLE BUTTONS AFTER JOINING
    document.getElementById("enterBtn").disabled = true;
    //document.getElementById("joinBtn").disabled = true;
}

// PREVIEW UPDATE
function updatePreview() {
    document.getElementById("previewName").textContent =
        state.name || "---";

    const img = document.getElementById("previewImage");
    const text = document.getElementById("previewCharacterText");

    if (state.character) {
        img.src = state.character.front;
        img.style.display = "block";

        text.textContent = state.character.name;
    } else {
        img.style.display = "none";
        //text.textContent = "---";
    }
}

function confettiBurst() {
    const images = [
        "/confetti/confetti1.png",
        "/confetti/confetti2.png"
    ];

    for (let i = 0; i < 50; i++) {
        const confetti = document.createElement("img");

        confetti.src = images[Math.floor(Math.random() * images.length)];

        confetti.style.position = "fixed";
        confetti.style.left = "50%";
        confetti.style.top = "40%";

        confetti.style.width = "36px";
        confetti.style.height = "36px";

        confetti.style.zIndex = "9999";
        confetti.style.pointerEvents = "none";

        // rainbow tint
        const hue = Math.floor(Math.random() * 360);
        confetti.style.filter = `hue-rotate(${hue}deg)`;

        document.body.appendChild(confetti);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 2 + Math.random() * 5;

        let x = 0;
        let y = 0;
        let gravity = 0;

        const interval = setInterval(() => {
            gravity += 0.15;

            x += Math.cos(angle) * velocity;
            y += Math.sin(angle) * velocity + gravity;

            confetti.style.transform = `translate(${x}px, ${y}px) rotate(${x * 2}deg)`;

            if (y > window.innerHeight) {
                clearInterval(interval);
                confetti.remove();
            }
        }, 16);
    }
}

updatePreview();

</script>

</body>
</html>
