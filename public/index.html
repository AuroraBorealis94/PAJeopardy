<!DOCTYPE html>
<html>
<head>
    <title>Jeopardy Lobby</title>
</head>
<body>

<br><br><br>
<h1 style="text-align:center;">PA Jeopardy 2026</h1>

<h2 style="text-align:center;">
    Room Code: <span id="roomCode">---</span>
</h2>

<br>

<h2>Choose Your Team Representative</h2>
<div id="characters"></div>

<br>

<h2>Choose Your Team Name</h2>

<input id="name" placeholder="Enter group name">

<!-- ENTER NAME -->
<button id="enterBtn" onclick="setName()">Enter</button>

<br><br>

<!-- PREVIEW -->
<h2>Preview</h2>

<div id="preview">
    <p><b>Name:</b> <span id="previewName">---</span></p>
    <p><b>Character:</b> <span id="previewCharacter">---</span></p>
</div>

<br><br>

<!-- JOIN - LOCK IN PLAYER -->
<button id="joinBtn" onclick="joinGame()" style="text-align:center;">Join Game</button>

<hr>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const state = {
    name: "",
    character: null
};

// ROOM CODE
socket.on("roomCode", (code) => {
    document.getElementById("roomCode").textContent = code;
});

// CHARACTER LIST
socket.on("characterList", (chars) => {
    const btn = document.createElement("button");

    btn.style.display = "flex";
    btn.style.flexDirection = "column";
    btn.style.alignItems = "center";

    const img = document.createElement("img");
    img.src = char.image;
    img.style.width = "60px";
    img.style.height = "60px";

    const label = document.createElement("div");
    label.textContent = char.name;

    btn.appendChild(img);
    btn.appendChild(label);

    chars.forEach(char => {
        const btn = document.createElement("button");
        btn.textContent = char;

        btn.onclick = () => {
            state.character = char;

            document.querySelectorAll("#characters button")
                .forEach(b => b.style.background = "");

            btn.style.background = "lightgreen";

            updatePreview();
        };

        container.appendChild(btn);
    });
});

// SET NAME
function setName() {
    const nameInput = document.getElementById("name");

    state.name = nameInput.value.trim();

    updatePreview();

    nameInput.value = "";
}

// JOIN GAME - LOCK IN PLAYER
function joinGame() {
    if (!state.name) {
        alert("Please enter your team name first");
        return;
    }

    if (!state.character) {
        alert("Please choose a character");
        return;
    }

    socket.emit("join", {
        name: state.name,
        character: state.character
    });

    // LOCK UI AFTER JOINING
    document.getElementById("name").disabled = true;

    document.querySelectorAll("#characters button")
    .forEach(b => {
        b.disabled = true;
        b.style.pointerEvents = "none";
    });

    document.getElementById("enterBtn").disabled = true;
    document.getElementById("joinBtn").disabled = true;
}

// PREVIEW UPDATE
function updatePreview() {
    document.getElementById("previewName").textContent =
        state.name || "---";

    document.getElementById("previewCharacter").textContent =
        state.character || "---";
}

updatePreview();

</script>

</body>
</html>
