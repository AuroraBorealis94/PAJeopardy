<!DOCTYPE html>
<html>
<head>
    <title>Jeopardy Lobby</title>
</head>
<body>

<br><br><br>
<h1 style="text-align:center;">PA Jeopardy 2026</h1>

<h2 style="text-align:center;">
    Room Code: <span id="roomCode">---</span>
</h2>

<br>

<h2>Choose Your Team Representative</h2>
<div id="characters"></div>

<br>

<h2>Choose Your Team Name</h2>

<input id="name" placeholder="Enter group name">

<br>

<!-- ENTER = SET NAME ONLY -->
<button onclick="setName()">Enter</button>

<br><br>

<!-- PREVIEW SECTION -->
<h2>Preview</h2>

<div id="preview">
    <p><b>Name:</b> <span id="previewName">---</span></p>
    <p><b>Character:</b> <span id="previewCharacter">---</span></p>
</div>

<br><br>

<!-- JOIN = LOCK IN PLAYER -->
<button onclick="joinGame()" style="text-align:center;">Join Game</button>

<hr>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let selectedCharacter = null;
//let playerName = "";

// --------------------
// ROOM CODE
// --------------------
socket.on("roomCode", (code) => {
    document.getElementById("roomCode").textContent = code;
});

// --------------------
// CHARACTER LIST
// --------------------
socket.on("characterList", (chars) => {
    const container = document.getElementById("characters");
    container.innerHTML = "";

    chars.forEach(char => {
        const btn = document.createElement("button");
        btn.textContent = char;

        btn.onclick = () => {
            selectedCharacter = char;

            document.querySelectorAll("#characters button")
                .forEach(b => b.style.background = "");

            btn.style.background = "lightgreen";

            updatePreview();
        };

        container.appendChild(btn);
    });
});

// --------------------
// ENTER = SET NAME ONLY
// --------------------
function setName() {
    const nameInput = document.getElementById("name");

    playerName = nameInput.value.trim();

    updatePreview();

    nameInput.value = "";
}

// --------------------
// JOIN GAME = LOCK IN PLAYER
// --------------------
function joinGame() {
    if (!playerName) {
        alert("Press Enter to set your team name first");
        return;
    }

    if (!selectedCharacter) {
        alert("Please choose a character");
        return;
    }

    socket.emit("join", {
        name: playerName,
        character: selectedCharacter
    });

    // lock UI after joining
    document.getElementById("name").disabled = true;

    document.querySelectorAll("#characters button")
        .forEach(b => b.disabled = true);

    document.querySelectorAll("button")
        .forEach(b => {
            if (b.textContent === "Enter") b.disabled = true;
            if (b.textContent === "Join Game") b.disabled = true;
        });
}

// --------------------
// PREVIEW UPDATE
// --------------------
function updatePreview() {
    document.getElementById("previewName").textContent =
        playerName || "---";

    document.getElementById("previewCharacter").textContent =
        selectedCharacter || "---";
}
</script>

</body>
</html>
