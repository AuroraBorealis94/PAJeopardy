<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    @font-face {
        font-family: 'Gyparody';
        src: url('/fonts/gyparody hv.ttf') format('truetype');
    }
    @font-face {
        font-family: 'Korinna';
        src: url('/fonts/ITC Korinna Regular.otf') format('opentype');
    }

    h1 {
        font-family: 'Gyparody';
        /*text-align:center;*/
        background: linear-gradient(
            45deg,
            #ff0000,
            #ffcc00,
            #00ccff,
            #ffffff
        );

        text-shadow: 0 0 10px rgba(255,255,255,0.2);

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        background-clip: text;
    }

    h2 {
        font-family: 'Korinna';
        font-size: 36px;
        text-transform: uppercase;
        padding-top: 50px;
    }

    body {
        font-family: 'Korinna';
        font-size: 24px;
        margin: 0;
        padding-top: 120px;
        padding-bottom: 120px;
        color: white;
        text-align: center;

        background-color: #000000;

        background-image: 
            url('/backgrounds/BgTop.png'),
            url('/backgrounds/BgBottom.png');

        background-repeat: 
            no-repeat,
            no-repeat;

        background-position: 
            top center,
            bottom center;

        background-size: 
            100% auto,
            100% auto;
    }

    #characters {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px;
        max-width: 1000px;
        margin: auto;
    }

    #characters button {
        font-family: 'Korinna', serif;
        background: white;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px;
        cursor: pointer;
        /*display: flex;
        flex-direction: column;
        align-items: center*/
    }

    #characters button img {
        width: 60px;
        height: 70px;
        /*object-fit: contain;*/
    }

    #characters button:hover {
        transform: scale(1.05);
        transition: 0.15s;
    }

    #characters button:active {
        transform: scale(0.95);
    }

    #characters button.selected {
        background: lightgreen;
        border: 2px solid limegreen;
    }

    #previewCharacterBox {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }

    #previewImage {
        width: 120px;
        height: 120px;
        object-fit: contain;
        display: none;
    }

    #joinBtn {
        font-family: 'Korinna', serif;

        font-size: 24px;
        padding: 15px 40px;

        background: linear-gradient(135deg, #ffcc00, #ff6600);
        color: black;

        border: none;
        border-radius: 12px;

        cursor: pointer;

        box-shadow: 0 0 15px rgba(255, 140, 0, 0.6);

        transition: all 0.2s ease;
    }

    #joinBtn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(255, 140, 0, 0.9);
    }

    #joinBtn:active {
        transform: scale(0.98);
    }

    #joinBtn:disabled {
        background: gray;
        transform: none;
        box-shadow: none;
    }

</style>

    <title>Jeopardy Lobby</title>
</head>
<body>

<!--<br><br><br>-->
<h1 style="font-size: 60px; padding-top: 80px;">PA Jeopardy</h1>
<h1 style="font-size: 50px; padding-bottom: 80px;">2026 Edition</h1>

<!-- <h2 style="text-align:center;">
    C
</h2> -->

<br>

<!-- ENTER NAME -->
<h2 style="padding-top: 120px;">Choose Your Team Name</h2>
<input id="name" placeholder="Enter group name">


<button id="enterBtn" onclick="setName()">Enter</button>

<br>

<!-- ENTER CHARACTER -->
<h2>Choose Your Team Representative</h2>
<div id="characters"></div>


<br><br>

<!-- PREVIEW -->
<h2>Preview</h2>

<div id="preview">
    <p><b>Name:</b> <span id="previewName">---</span></p>
    <p><b>Character:</b></p>

    <!--<img id="previewImage" 
         src="" -->

    <div id="previewCharacterBox">
        <img id="previewImage" src="" />
        <div id="previewCharacterText">---</div>
    </div>
    <div id="previewCharacterText">---</div>
</div>

<br><br>

<!-- JOIN - LOCK IN PLAYER -->
<button id="joinBtn" onclick="joinGame()">Join Game</button>

<hr>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const state = {
    name: "",
    character: null
};

// ROOM CODE
socket.on("roomCode", (code) => {
    document.getElementById("roomCode").textContent = code;
});

// CHARACTER LIST
socket.on("characterList", (chars) => {
    const container = document.getElementById("characters");
    container.innerHTML = "";

    chars.forEach(char => {
        const btn = document.createElement("button");

        // btn.style.display = "flex";
        // btn.style.flexDirection = "column";
        // btn.style.alignItems = "left";
        // btn.style.margin = "5px";

        const img = document.createElement("img");
        img.src = char.image;
        //img.style.width = "60px";
        //img.style.height = "60px";

        const label = document.createElement("div");
        label.textContent = char.name;

        btn.appendChild(img);
        btn.appendChild(label);

        btn.onclick = () => {
            state.character = char;

            // CLEAR BUTTON SELECTION
            document.querySelectorAll("#characters button")
                .forEach(b => b.classList.remove("selected"));

            // ADD SELECTION TO CLICKED BTN
            btn.classList.add("selected");

            updatePreview();
        };

        container.appendChild(btn);
    });
});

// SET NAME
function setName() {
    const nameInput = document.getElementById("name");

    state.name = nameInput.value.trim();

    updatePreview();

    nameInput.value = "";
}

// JOIN GAME - LOCK IN PLAYER
function joinGame() {
    if (!state.name) {
        alert("Please enter your team name first");
        return;
    }

    if (!state.character) {
        alert("Please choose a character");
        return;
    }

    const joinBtn = document.getElementById("joinBtn");
    joinBtn.disabled = true;
    joinBtn.innerText = "Joined!";
    joinBtn.style.opacity = "0.6";
    joinBtn.style.cursor = "not-allowed";

    confettiBurst();

    socket.emit("join", {
        name: state.name,
        character: state.character.name
    });

    // LOCK UI AFTER JOINING
    document.getElementById("name").disabled = true;

    document.querySelectorAll("#characters button")
    .forEach(b => {
        b.disabled = true;
        b.style.pointerEvents = "none";
    });

    // DISABLE BUTTONS AFTER JOINING
    document.getElementById("enterBtn").disabled = true;
    //document.getElementById("joinBtn").disabled = true;
}

// PREVIEW UPDATE
function updatePreview() {
    document.getElementById("previewName").textContent =
        state.name || "---";

    const img = document.getElementById("previewImage");
    const text = document.getElementById("previewCharacterText");

    if (state.character) {
        img.src = state.character.image;
        img.style.display = "block";

        text.textContent = state.character.name;
    } else {
        img.style.display = "none";
        text.textContent = "---";
    }
}

function confettiBurst() {
    const images = [
        "/confetti/confetti1.png",
        "/confetti/confetti2.png"
    ];

    for (let i = 0; i < 50; i++) {
        const confetti = document.createElement("img");

        confetti.src = images[Math.floor(Math.random() * images.length)];

        confetti.style.position = "fixed";
        confetti.style.left = "50%";
        confetti.style.top = "40%";

        confetti.style.width = "24px";
        confetti.style.height = "24px";

        confetti.style.zIndex = "9999";
        confetti.style.pointerEvents = "none";

        // rainbow tint
        const hue = Math.floor(Math.random() * 360);
        confetti.style.filter = `hue-rotate(${hue}deg)`;

        document.body.appendChild(confetti);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 2 + Math.random() * 5;

        let x = 0;
        let y = 0;
        let gravity = 0;

        const interval = setInterval(() => {
            gravity += 0.15;

            x += Math.cos(angle) * velocity;
            y += Math.sin(angle) * velocity + gravity;

            confetti.style.transform = `translate(${x}px, ${y}px) rotate(${x * 2}deg)`;

            if (y > window.innerHeight) {
                clearInterval(interval);
                confetti.remove();
            }
        }, 16);
    }
}

updatePreview();

</script>

</body>
</html>
