<!DOCTYPE html>
<html>
<head>
<style>
    @font-face {
        font-family: 'Gyparody';
        src: url('/fonts/gyparody hv.ttf') format('truetype');
    }
    @font-face {
        font-family: 'Korinna';
        src: url('/fonts/ITC Korinna Regular.otf') format('opentype');
    }

    #h1 {
        font-family: 'Gyparody';
        font-size: 48px;
    }

    #h2 {
        font-family: 'Korinna';
        font-size: 24px;
    }

    #body {
        font-family: 'Korinna';
        font-size: 16px
    }

    body {
        margin: 0;
        padding: 0;

        background-image: url('/backgrounds/bg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        color: white;
        text-align: center;
    }

    #characters {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px;
        max-width: 800px;
        margin: auto;
    }

    #characters button {
        background: white;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px;
        cursor: pointer;
    }

    #characters button img {
        width: 60px;
        height: 70px;
    }
</style>

    <title>Jeopardy Lobby</title>
</head>
<body>

<br><br><br>
<h1 style="text-align:center; font-family: 'Gyparody'; font-size: 48px;">PA Jeopardy 2026</h1>

<!-- <h2 style="text-align:center;">
    C
</h2> -->

<br>

<h2>Choose Your Team Representative</h2>
<div id="characters"></div>

<br>

<h2>Choose Your Team Name</h2>

<input id="name" placeholder="Enter group name">

<!-- ENTER NAME -->
<button id="enterBtn" onclick="setName()">Enter</button>

<br><br>

<!-- PREVIEW -->
<h2>Preview</h2>

<div id="preview">
    <p><b>Name:</b> <span id="previewName">---</span></p>
    <p><b>Character:</b></p>

    <img id="previewImage" 
         src="" 
         style="width:100px; height:100px; display:none;" />

    <div id="previewCharacterText">---</div>
</div>

<br><br>

<!-- JOIN - LOCK IN PLAYER -->
<button id="joinBtn" onclick="joinGame()" style="text-align:center;">Join Game</button>

<hr>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const state = {
    name: "",
    character: null
};

// ROOM CODE
socket.on("roomCode", (code) => {
    document.getElementById("roomCode").textContent = code;
});

// CHARACTER LIST
socket.on("characterList", (chars) => {
    const container = document.getElementById("characters");
    container.innerHTML = "";

    chars.forEach(char => {
        const btn = document.createElement("button");

        // btn.style.display = "flex";
        // btn.style.flexDirection = "column";
        // btn.style.alignItems = "left";
        // btn.style.margin = "5px";

        const img = document.createElement("img");
        img.src = char.image;
        //img.style.width = "60px";
        //img.style.height = "60px";

        const label = document.createElement("div");
        label.textContent = char.name;

        btn.appendChild(img);
        btn.appendChild(label);

        btn.onclick = () => {
            state.character = char;

            document.querySelectorAll("#characters button")
                .forEach(b => b.style.background = "");

            btn.style.background = "lightgreen";

            updatePreview();
        };

        container.appendChild(btn);
    });
});

// SET NAME
function setName() {
    const nameInput = document.getElementById("name");

    state.name = nameInput.value.trim();

    updatePreview();

    nameInput.value = "";
}

// JOIN GAME - LOCK IN PLAYER
function joinGame() {
    if (!state.name) {
        alert("Please enter your team name first");
        return;
    }

    if (!state.character) {
        alert("Please choose a character");
        return;
    }

    socket.emit("join", {
        name: state.name,
        character: state.character.name
    });

    // LOCK UI AFTER JOINING
    document.getElementById("name").disabled = true;

    document.querySelectorAll("#characters button")
    .forEach(b => {
        b.disabled = true;
        b.style.pointerEvents = "none";
    });

    // DISABLE BUTTONS AFTER JOINING
    document.getElementById("enterBtn").disabled = true;
    document.getElementById("joinBtn").disabled = true;
}

// PREVIEW UPDATE
function updatePreview() {
    document.getElementById("previewName").textContent =
        state.name || "---";

    const img = document.getElementById("previewImage");
    const text = document.getElementById("previewCharacterText");

    if (state.character) {
        img.src = state.character.image;
        img.style.display = "block";

        text.textContent = state.character.name;
    } else {
        img.style.display = "none";
        text.textContent = "---";
    }
}

updatePreview();

</script>

</body>
</html>
