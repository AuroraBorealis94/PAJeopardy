<!DOCTYPE html>
<html>
<head>
    <title>Jeopardy Lobby</title>
</head>
<body>

<br><br><br>

<h1 style="text-align: center; font-weight: bold;">PA Jeopardy 2026<h1>

<h2 style="text-align: center;">Room Code: <span id="roomCode">---</span></h2>

<br>

<h2>Choose Your Team Representative</h2>
<div id="characters"></div>

<br>

<h2>Choose Your Team Name</h2>
<input id="name" placeholder="Enter group name">
<button onclick="joinGame()">Join Game</button>

<br><br>

<h2>Teams:</h2>
<ul id="players"></ul><br>

<br>

<button id="startBtn" onclick="startGame()" disabled>
    Start Game
</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let selectedCharacter = null;
// TO BE REMOVED
let playerCount = 0;

// ROOM CODE
socket.on("roomCode", (code) => {
    document.getElementById("roomCode").textContent = code;
});

// CHARACTERS
socket.on("characterList", (chars) => {
    const container = document.getElementById("characters");
    container.innerHTML = "";

    chars.forEach(char => {
        const btn = document.createElement("button");
        btn.textContent = char;

        btn.onclick = () => {
            selectedCharacter = char;

            // simple visual feedback
            document.querySelectorAll("#characters button")
                .forEach(b => b.style.background = "");

            btn.style.background = "lightgreen";
        };

        container.appendChild(btn);
    });
});

// JOIN
function joinGame() {
    const nameInput = document.getElementById("name");

    const name = nameInput.value.trim();

    if (!name) {
        alert("Please enter a team name");
        return;
    }

    if (!selectedCharacter) {
        alert("Please choose a character");
        return;
    }

    socket.emit("join", {
        name: name,
        character: selectedCharacter
    });

    // CLEAR INPUT AFTER JOIN (your request)
    nameInput.value = "";

    // OPTIONAL: lock UI after joining
    nameInput.disabled = true;

    document.querySelectorAll("#characters button")
        .forEach(b => b.disabled = true);
}

// PLAYER LIST UPDATE - TO BE REMOVED
socket.on("playerList", (players) => {
    const list = document.getElementById("players");
    list.innerHTML = "";

    playerCount = players.length;

    players.forEach(p => {
        const li = document.createElement("li");
        li.textContent = p.name;
        list.appendChild(li);
    });

    // ENABLE START BUTTON ONLY IF PLAYERS EXIST
    if (playerCount > 0) {
        document.getElementById("startBtn").disabled = false;
    }
});

// START GAME
function startGame() {
    socket.emit("startGame");
}
</script>

</body>
</html>
