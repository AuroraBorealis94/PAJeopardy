<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* #region Fonts */
    @font-face {
        font-family: 'Gyparody';
        src: url('/fonts/gyparody hv.ttf') format('truetype');
    }
    @font-face {
        font-family: 'Korinna';
        src: url('/fonts/ITC Korinna Regular.otf') format('opentype');
    }
/* #endregion */

/* #region Headers & Body */
    h1 {
        font-family: 'Gyparody';
        margin: 0;
        line-height: 1;
    }

    h2 {
        font-family: 'Korinna';
        font-size: 20px;
        text-transform: uppercase;
    }

    body {
        font-family: 'Korinna';
        font-size: 16px;
        margin: 0;
        padding-top: 40px;
        padding-bottom: 20px;
        color: white;
        text-align: center;

        background-color: #000000;

        background-image: 
            url('/backgrounds/BgTop.png'),
            url('/backgrounds/BgBottom.png');

        background-repeat: 
            no-repeat,
            no-repeat;

        background-position: 
            top center,
            bottom center;

        background-size: 
            100% auto,
            100% auto;
    }
/* #endregion */

/* #region Page1 */
    #h11 {
        background: linear-gradient(
            45deg,
            #a8a8a8,
            #ffffff,
            #ffffff,
            #a8a8a8
        );

        text-shadow: 0 0 10px rgba(255,255,255,0.2);
        font-size: 45px;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        background-clip: text;
    }

    #h12 {
        background: linear-gradient(
            45deg,
            #ff9139,
            #ffe739,
            #ff9139,
            #ffcb39
        );

        text-shadow: 0 0 10px rgba(255,255,255,0.2);
        font-size: 30px;
        padding-bottom: 30px;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        background-clip: text;
    }

    #characters {
        display: flex;
        overflow-x: auto;
        gap: 18px;
        padding: 30px 0;
        padding-bottom: 30px;
        max-width: 100%;
        align-items: center;
    }

    #characters::before,
    #characters::after {
        content: "";
        flex: 0 0 calc(50% - 70px);
    }

    #characters::-webkit-scrollbar {
        display: none;
    }

    #characters button {
        font-family: 'Korinna', serif;
        position: relative;
        overflow: hidden;

        background: white;
        border: 2px solid #ccc;
        border-radius: 10px;

        padding: 0;
        cursor: pointer;

        scroll-behavior: smooth;
    }

    .charCard {
        flex: 0 0 clamp(110px, 30vw, 140px);
        scroll-snap-align: center;
        perspective: 800px;
        transition: transform 0.3s ease, opacity 0.3s ease;
        opacity: 0.6;
        transform: scale(0.9);
        position:relative;
    }

    .charCard.center {
        opacity: 1;
        transform: scale(1.25);
        z-index: 10;
    }

    .cardInner {
        width: 100%;
        aspect-ratio: 3 / 4;
        transition: transform 0.5s ease;
        transform-style: preserve-3d;
    }

    .charCard.selected .cardInner {
        transform: rotateY(180deg);
    }

    .cardFront, .cardBack {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        object-fit: cover;
        border-radius: 10px;
        overflow: hidden;
    }

    .cardFront img,
    .cardBack img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .cardBack {
        transform: rotateY(180deg);
    }

    .charCard:active {
        transform: scale(0.95);
    }

    .charCard.selected {
        animation: bounceSelect 0.3s ease;
    }

    #preview {
        font-family: 'Korinna';
        font-size: 18px;
        text-transform: uppercase;
    }

    #previewCharacterBox {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }

    #previewImage {
        width: 120px;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        display: none;
    }

    #joinBtn {
        font-family: 'Korinna', serif;

        font-size: 24px;
        padding: 10px 35px;

        background: linear-gradient(135deg, #ffcc00, #ff6600);
        color: black;

        border: 1px solid #fff;
        border-radius: 12px;

        cursor: pointer;

        box-shadow: 0 0 15px rgba(255, 140, 0, 0.6);

        transition: all 0.2s ease;
    }

    #joinBtn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(255, 140, 0, 0.9);
    }

    #joinBtn:active {
        transform: scale(0.98);
    }

    #joinBtn:disabled {
        background: gray;
        transform: none;
        box-shadow: none;
    }

    #prevBtn, #nextBtn {
        position: relative;
        z-index: 999;
    }

    .charCard.locked {
        filter: grayscale(1);
        opacity: 0.3;
        cursor: not-allowed;
    }
/* #endregion */

/* #region Page2 */
    #waitingScreen {
        position: fixed;
        inset: 0;
        background: black;
        color: white;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
    }

    #waitingScreen.show {
        opacity: 1;
        pointer-events: auto;
    }

    #waitingCharacter img {
        width: 140px;
        margin-top: 20px;
    }

    .hidden {
        display: none;
    }


    #waitingCharacter img {
        transform: scale(0.9);
        opacity: 0;
        transition: all 0.4s ease;
    }

    #waitingScreen.show #waitingCharacter img {
        transform: scale(1);
        opacity: 1;
    }

    #reconnectOverlay {
        position: fixed;
        inset: 0;
        background: black;
        color: white;

        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 9999;

        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    #reconnectOverlay.show {
        opacity: 1;
        pointer-events: auto;
    }
/* #endregion */

</style>

<!-- HTML -->
    <title>Jeopardy Lobby</title>
</head>
<body>

<!-- LOBBY SCREEN -->
<div id="lobbyUI">
    <!-- TITLE -->
    <h1 id="h11">PA Jeopardy</h1>
    <h1 id="h12">2026 Edition</h1>

    <!-- PREVIEW -->
    <div id="preview">
        <p id="teamLabel" style="display:none;"><b>Team </b><span id="previewName">---</span></p>

        <div id="previewCharacterBox">
            <img id="previewImage" src="" />
        </div>
    </div>

    <!-- ENTER NAME -->
    <h2 style="padding-top: 20px;">Choose Your Team Name</h2>
    <input id="name" placeholder="Enter group name">
    <button id="enterBtn" onclick="setName()">Enter</button>

    <br>

    <!-- ENTER CHARACTER -->
    <h2 style="padding-top: 10px;">Choose Your Team Representative</h2>

    <div style="display:flex; justify-content:center; gap:18px; align-items:center;">
        <button id="prevBtn">&#8592;</button>

        <div id="characters"></div>

        <button id="nextBtn">&#8594;</button>
    </div>

    <!-- JOIN - LOCK IN PLAYER -->
    <button id="joinBtn" onclick="joinGame()">Join Game</button>
</div>

<!-- WAITING SCREEN -->
<div id="waitingScreen" class="hidden">
    <h2>Waiting for other players...</h2>

    <div id="waitingCharacter">
        <img id="waitingImage" />
        <p id="waitingName"></p>
    </div>

    <p id="playerCount">0 players joined</p>
</div>

<!-- RECONNECTING SCREEN -->
<div id="reconnectOverlay" class="hidden">
    <h2>Reconnecting...</h2>
</div>

<!-- JS -->
<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io({
    transports: ["websocket"],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 500
});

const state = {
    name: "",
    character: null
};

console.log("LOCAL PLAYER ID ON LOAD:", localStorage.getItem("playerId"));

// ROOM CODE
socket.on("roomCode", (code) => {
    document.getElementById("roomCode").textContent = code;
});

let hasReconnected = false;

socket.on("connect", () => {
    console.log("Connected:", socket.id);

    if (disconnectTimer) {
        clearTimeout(disconnectTimer);
        disconnectTimer = null;
    }

    hideReconnectOverlay();

    if (hasReconnected) return;

    // RECONNECT HERE (ONLY HERE)
    const savedName = localStorage.getItem("name");
    const savedCharacterRaw = localStorage.getItem("character");
    const playerId = localStorage.getItem("playerId");

    if (savedName && savedCharacterRaw && playerId) {
        const savedCharacter = JSON.parse(savedCharacterRaw);

        console.log("RECONNECT EMIT:", {
            playerId,
            name: savedName,
            character: savedCharacter.name
        });

        socket.emit("join", {
            playerId,
            name: savedName,
            character: savedCharacter.name
        });

        state.name = savedName;
        state.character = savedCharacter;

        showWaitingScreen();

        hasReconnected = true;
    }
});

let realCards = [];

// CHARACTER LIST
socket.on("characterList", (chars) => {
    console.log("RECONNECT CHECK:", {
        hasJoined: localStorage.getItem("hasJoined"),
        name: localStorage.getItem("name"),
        character: localStorage.getItem("character"),
        playerId: localStorage.getItem("playerId")
    });

    const container = document.getElementById("characters");
    container.innerHTML = "";

    realCards = chars.map((char, index) => {
        const btn = document.createElement("button");
        btn.classList.add("charCard");
        btn.style.animation = "cardPopIn 0.5s ease";

        const inner = document.createElement("div");
        inner.classList.add("cardInner");

        const front = document.createElement("div");
        front.classList.add("cardFront");

        const back = document.createElement("div");
        back.classList.add("cardBack");

        const imgFront = document.createElement("img");
        imgFront.src = char.front;

        const imgBack = document.createElement("img");
        imgBack.src = char.back;

        front.appendChild(imgFront);
        back.appendChild(imgBack);
        inner.appendChild(front);
        inner.appendChild(back);
        btn.appendChild(inner);

        btn.__charData = char;
        btn.__index = index;

        btn.onclick = () => {
            if (lockedSet.has(char.name.toLowerCase())) return;

            setSelectedCard(btn);
            currentIndex = index;
            centerOnCard(btn);
        };

        container.appendChild(btn);
        return btn;
    });

    currentIndex = 0;

    requestAnimationFrame(() => {
        updateCenterCard();
        updateLockedUI();

        if (state.character && localStorage.getItem("hasJoined") === "true") {
            const match = realCards.find(
                c => c.__charData.name === state.character.name
            );

            if (match) {
                setSelectedCard(match);
                centerOnCard(match);
            }
        }
    });
});

// PLAYER LIST
socket.on("playerList", (players) => {
    document.getElementById("playerCount").textContent =
        players.length + " players joined";
});

// CAROUSEL MANAGER
window.onload = () => {
    const container = document.getElementById("characters");

    // ARROW CONTROLS
    document.getElementById("nextBtn").onclick = () => scrollByCard(1);
    document.getElementById("prevBtn").onclick = () => scrollByCard(-1);

    // SCROLL LISTENER
    container.addEventListener("scroll", () => {
        updateCenterCard();
    });
};

// LOCKED CARDS
let lockedSet = new Set();
socket.on("lockedCharacters", (locked) => {
    lockedSet = new Set(locked.map(c => c.toLowerCase()));

    requestAnimationFrame(() => {
        updateLockedUI();
    });
});

// CHARACTER TAKEN
socket.on("characterTaken", () => {
    alert("That character was just taken. Please choose another.");

    const joinBtn = document.getElementById("joinBtn");
    joinBtn.disabled = false;
    joinBtn.innerText = "Join Game";
    joinBtn.style.opacity = "1";
});

let disconnectTimer = null;

socket.on("disconnect", () => {
    const player = game.players.find(p => p.id === socket.id);

    if (!player) return;

    console.log(player.name + " temporarily disconnected");

    player.disconnected = true;
    player.disconnectTime = Date.now();

    const thisPlayerId = player.playerId;

    setTimeout(() => {
        const stillGone = game.players.find(
            p => p.playerId === thisPlayerId && p.disconnected
        );

        if (stillGone) {
            console.log(player.name + " fully removed");

            lockedCharacters.delete(player.character.toLowerCase());

            game.players = game.players.filter(
                p => p.playerId !== thisPlayerId
            );

            io.emit("playerList", game.players);
            io.emit("lockedCharacters", Array.from(lockedCharacters));
        }
    }, 5000);
});

socket.on("forceReset", () => {
    console.log("Session expired, resetting");

    localStorage.removeItem("hasJoined");
    localStorage.removeItem("playerId");
    localStorage.removeItem("name");
    localStorage.removeItem("character");

    location.reload();
});

socket.on("joinSuccess", () => {
    localStorage.setItem("hasJoined", "true");
    localStorage.setItem("gameSession", currentSession);

    const joinBtn = document.getElementById("joinBtn");
    joinBtn.disabled = true;
    joinBtn.innerText = "Joined";
    joinBtn.style.opacity = "0.6";

    confettiBurst();

    document.getElementById("name").disabled = true;
    document.getElementById("enterBtn").disabled = true;

    document.querySelectorAll("#characters button").forEach(b => {
        b.disabled = true;
        b.style.pointerEvents = "none";
    });

    setTimeout(() => {
        showWaitingScreen();
    }, 300);
});

let currentSession = null;

socket.on("gameSession", (session) => {
    const savedSession = localStorage.getItem("gameSession");
    const hasJoined = localStorage.getItem("hasJoined");

    currentSession = session;

    // SERVER RESTART wipe
    if (hasJoined === "true" && savedSession && savedSession !== session) {
        console.log("Server restarted - clearing session");

        localStorage.clear();
        location.reload();
        return;
    }
});

socket.on("resetClientState", () => {
    localStorage.removeItem("hasJoined");
    localStorage.removeItem("character");
    localStorage.removeItem("name");
    localStorage.removeItem("gameSession");
});

// SET NAME
function setName() {
    const nameInput = document.getElementById("name");
    state.name = nameInput.value.trim();

    localStorage.setItem("name", state.name);

    document.getElementById("teamLabel").style.display = "block";

    updatePreview();

    nameInput.value = "";
}

function setSelectedCard(card) {
    document.querySelectorAll(".charCard")
        .forEach(c => c.classList.remove("selected"));

    card.classList.add("selected");
    state.character = card.__charData;

    localStorage.setItem("character", JSON.stringify(state.character));

    updatePreview();
}

function centerOnCard(card) {
    const container = document.getElementById("characters");

    const containerRect = container.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();

    const offset =
        (cardRect.left + cardRect.width / 2) -
        (containerRect.left + containerRect.width / 2);

    container.scrollBy({
        left: offset,
        behavior: "smooth"
    });
}

function updateCenterCard() {
    const container = document.getElementById("characters");
    const cards = container.querySelectorAll(".charCard");

    if (!cards.length) return;

    const containerCenter =
        container.getBoundingClientRect().left +
        container.offsetWidth / 2;

    let closest = null;
    let closestDistance = Infinity;
    
    cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const center = rect.left + rect.width / 2;

        const distance = Math.abs(center - containerCenter);

        if (distance < closestDistance) {
            closestDistance = distance;
            closest = card;
        }
    });

    cards.forEach(c => c.classList.remove("center"));

    if (closest) {
        closest.classList.add("center");
        currentIndex = realCards.indexOf(closest);
    }
}

function scrollByCard(direction) {
    if (!realCards.length) return;

    currentIndex += direction;

    if (currentIndex < 0) {
        currentIndex = realCards.length - 1;
    }

    if (currentIndex >= realCards.length) {
        currentIndex = 0;
    }

    const card = realCards[currentIndex];
    if (!card) return;

    centerOnCard(card);
}

function updateLockedUI() {
    document.querySelectorAll(".charCard").forEach(card => {
        const name = card.__charData.name.toLowerCase();

        if (lockedSet.has(name)) {
            card.classList.add("locked");
            card.style.opacity = "0.3";
            card.style.pointerEvents = "none";
            card.style.filter = "grayscale(1)";
        } else {
            card.classList.remove("locked");
            card.style.opacity = "";
            card.style.pointerEvents = "";
            card.style.filter = "";
        }
    });
}

// PREVIEW UPDATE
function updatePreview() {
    document.getElementById("previewName").textContent =
        state.name || "---";

    const img = document.getElementById("previewImage");
    //const text = document.getElementById("previewCharacterText");

    if (state.character) {
        img.src = state.character.front;
        img.style.display = "block";

        //text.textContent = state.character.name;
    } else {
        img.style.display = "none";
    }
}

updatePreview();

// JOIN GAME - LOCK IN PLAYER
function joinGame() {
    if (!state.name) {
        alert("Please enter your team name first");
        return;
    }

    if (!state.character) {
        alert("Please choose a character");
        return;
    }

    // PERSISTENT PLAYER ID
    let playerId = localStorage.getItem("playerId");

    if (!playerId) {
        playerId = crypto.randomUUID();
        localStorage.setItem("playerId", playerId);
    }

    socket.emit("join", {
        playerId,
        name: state.name,
        character: state.character.name
    });

    /*
    // LOCK UI
    document.getElementById("name").disabled = true;
    document.getElementById("enterBtn").disabled = true;
    document.querySelectorAll("#characters button").forEach(b => {
        b.disabled = true;
        b.style.pointerEvents = "none";
    });
    */
}

// CONFETTI
function confettiBurst() {
    const images = [
        "/confetti/confetti1.png",
        "/confetti/confetti2.png"
    ];

    for (let i = 0; i < 50; i++) {
        const confetti = document.createElement("img");

        confetti.src = images[Math.floor(Math.random() * images.length)];

        confetti.style.position = "fixed";
        confetti.style.left = "50%";
        confetti.style.top = "40%";

        confetti.style.width = "36px";
        confetti.style.height = "36px";

        confetti.style.zIndex = "9999";
        confetti.style.pointerEvents = "none";

        // rainbow tint
        const hue = Math.floor(Math.random() * 360);
        confetti.style.filter = `hue-rotate(${hue}deg)`;

        document.body.appendChild(confetti);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 2 + Math.random() * 5;

        let x = 0;
        let y = 0;
        let gravity = 0;

        const interval = setInterval(() => {
            gravity += 0.15;

            x += Math.cos(angle) * velocity;
            y += Math.sin(angle) * velocity + gravity;

            confetti.style.transform = `translate(${x}px, ${y}px) rotate(${x * 2}deg)`;

            if (y > window.innerHeight) {
                clearInterval(interval);
                confetti.remove();
            }
        }, 16);
    }
}

// WAITING SCREEN (P2)
function showWaitingScreen() {
    const screen = document.getElementById("waitingScreen");

    // hide lobby
    document.getElementById("lobbyUI").style.display = "none";

    // populate player info
    document.getElementById("waitingImage").src = state.character.front;
    document.getElementById("waitingName").textContent = state.name;

    screen.classList.remove("hidden");

    requestAnimationFrame(() => {
        screen.classList.add("show");
    });
}

function showReconnectOverlay() {
    const el = document.getElementById("reconnectOverlay");
    el.classList.remove("hidden");

    requestAnimationFrame(() => {
        el.classList.add("show");
    });
}

function hideReconnectOverlay() {
    const el = document.getElementById("reconnectOverlay");
    el.classList.remove("show");

    setTimeout(() => {
        el.classList.add("hidden");
    }, 300);
}

</script>

</body>
</html>
