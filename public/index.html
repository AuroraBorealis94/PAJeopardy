<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    @font-face {
        font-family: 'Gyparody';
        src: url('/fonts/gyparody hv.ttf') format('truetype');
    }
    @font-face {
        font-family: 'Korinna';
        src: url('/fonts/ITC Korinna Regular.otf') format('opentype');
    }

    h1 {
        font-family: 'Gyparody';
        margin: 0;
        line-height: 1;
    }

    #h11 {
        background: linear-gradient(
            45deg,
            #a8a8a8,
            #ffffff,
            #ffffff,
            #a8a8a8
        );

        text-shadow: 0 0 10px rgba(255,255,255,0.2);
        font-size: 45px;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        background-clip: text;
    }

    #h12 {
        background: linear-gradient(
            45deg,
            #ff9139,
            #ffe739,
            #ff9139,
            #ffcb39
        );

        text-shadow: 0 0 10px rgba(255,255,255,0.2);
        font-size: 30px;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        background-clip: text;
    }

    h2 {
        font-family: 'Korinna';
        font-size: 20px;
        text-transform: uppercase;
    }

    body {
        font-family: 'Korinna';
        font-size: 16px;
        margin: 0;
        padding-top: 40px;
        padding-bottom: 40px;
        color: white;
        text-align: center;

        background-color: #000000;

        background-image: 
            url('/backgrounds/BgTop.png'),
            url('/backgrounds/BgBottom.png');

        background-repeat: 
            no-repeat,
            no-repeat;

        background-position: 
            top center,
            bottom center;

        background-size: 
            100% auto,
            100% auto;
    }

    #characters {
        display: flex;
        overflow-x: auto;
        gap: 18px;
        padding: 30px 0;
        max-width: 100%;
        align-items: center;
    }

    #characters::before,
    #characters::after {
        content: "";
        flex: 0 0 calc(50% - 70px);
    }

    #characters::-webkit-scrollbar {
        display: none;
    }

    #characters button {
        font-family: 'Korinna', serif;
        position: relative;
        overflow: hidden;

        background: white;
        border: 2px solid #ccc;
        border-radius: 10px;

        padding: 0;
        cursor: pointer;

        scroll-behavior: smooth;
    }

    .charCard {
        flex: 0 0 clamp(110px, 30vw, 140px);
        scroll-snap-align: center;
        perspective: 800px;
        transition: transform 0.3s ease, opacity 0.3s ease;
        opacity: 0.6;
        transform: scale(0.9);
        position:relative;
    }

    .charCard.center {
        opacity: 1;
        transform: scale(1.25);
        z-index: 10;
    }

    .cardInner {
        width: 100%;
        aspect-ratio: 3 / 4;
        transition: transform 0.5s ease;
        transform-style: preserve-3d;
    }

    .charCard.selected .cardInner {
        transform: rotateY(180deg);
    }

    .cardFront, .cardBack {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        object-fit: cover;
        border-radius: 10px;
        overflow: hidden;
    }

    .cardFront img,
    .cardBack img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .cardBack {
        transform: rotateY(180deg);
    }

    /* NAME OVERLAY */
    /*
    .charName {
        position: absolute;
        bottom: 0;
        width: 100%;

        font-family: 'Korinna', serif;
        color: white;
        font-size: 14px;

        background: rgba(0,0,0,0.6);
    }
    */

    .charCard:active {
        transform: scale(0.95);
    }

    .charCard.selected {
        animation: bounceSelect 0.3s ease;
    }

    #preview {
        font-family: 'Korinna';
        font-size: 18px;
        text-transform: uppercase;
    }

    #previewCharacterBox {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }

    #previewImage {
        width: 120px;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        display: none;
    }

    #joinBtn {
        font-family: 'Korinna', serif;

        font-size: 24px;
        padding: 10px 40px;

        background: linear-gradient(135deg, #ffcc00, #ff6600);
        color: black;

        border: none;
        border-radius: 12px;

        cursor: pointer;

        box-shadow: 0 0 15px rgba(255, 140, 0, 0.6);

        transition: all 0.2s ease;
    }

    #joinBtn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(255, 140, 0, 0.9);
    }

    #joinBtn:active {
        transform: scale(0.98);
    }

    #joinBtn:disabled {
        background: gray;
        transform: none;
        box-shadow: none;
    }

    #prevBtn, #nextBtn {
        position: relative;
        z-index: 999;
    }

    .charCard.locked {
        filter: grayscale(1);
        opacity: 0.3;
        cursor: not-allowed;
    }

</style>
    <title>Jeopardy Lobby</title>
</head>
<body>

<h1 id="h11">PA Jeopardy</h1>
<h1 id="h12">2026 Edition</h1>

<!-- PREVIEW -->
<div id="preview">
    <p id="teamLabel" style="display:none;"><b>Team </b><span id="previewName">---</span></p>

    <div id="previewCharacterBox">
        <img id="previewImage" src="" />
        <!--<div id="previewCharacterText">---</div>-->
    </div>
</div>

<!-- ENTER NAME -->
<h2 style="padding-top: 60px;">Choose Your Team Name</h2>
<input id="name" placeholder="Enter group name">


<button id="enterBtn" onclick="setName()">Enter</button>

<br>

<!-- ENTER CHARACTER -->
<h2 style="padding-top: 10px;">Choose Your Team Representative</h2>

<div style="display:flex; justify-content:center; gap:18px; align-items:center;">
    <button id="prevBtn">&#8592;</button>

    <div id="characters"></div>

    <button id="nextBtn">&#8594;</button>
</div>

<!-- JOIN - LOCK IN PLAYER -->
<button id="joinBtn" onclick="joinGame()">Join Game</button>

<hr>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const state = {
    name: "",
    character: null
};

// ROOM CODE
socket.on("roomCode", (code) => {
    document.getElementById("roomCode").textContent = code;
});

// CHARACTER LIST
let realCards = [];

socket.on("characterList", (chars) => {
    const container = document.getElementById("characters");
    container.innerHTML = "";

    realCards = chars.map((char, index) => {
        const btn = document.createElement("button");
        btn.classList.add("charCard");
        btn.style.animation = "cardPopIn 0.5s ease";

        const inner = document.createElement("div");
        inner.classList.add("cardInner");

        const front = document.createElement("div");
        front.classList.add("cardFront");

        const back = document.createElement("div");
        back.classList.add("cardBack");

        const imgFront = document.createElement("img");
        imgFront.src = char.front;

        const imgBack = document.createElement("img");
        imgBack.src = char.back;

        front.appendChild(imgFront);
        back.appendChild(imgBack);
        inner.appendChild(front);
        inner.appendChild(back);
        btn.appendChild(inner);

        btn.__charData = char;
        btn.__index = index;

        btn.onclick = () => {
            if (lockedSet.has(char.name.toLowerCase())) return;

            setSelectedCard(btn);
            currentIndex = index;
            centerOnCard(btn);
        };

        container.appendChild(btn);
        return btn;
    });

    currentIndex = 0;

    requestAnimationFrame(() => {
        updateCenterCard();
        updateLockedUI();
    });
});

// CAROUSEL MANAGER
window.onload = () => {
    const container = document.getElementById("characters");

    // ARROW CONTROLS
    document.getElementById("nextBtn").onclick = () => scrollByCard(1);
    document.getElementById("prevBtn").onclick = () => scrollByCard(-1);

    // SCROLL LISTENER
    container.addEventListener("scroll", () => {
        updateCenterCard();
    });
};

// LOCKED CARDS
let lockedSet = new Set();
socket.on("lockedCharacters", (locked) => {
    lockedSet = new Set(locked.map(c => c.toLowerCase()));
    updateLockedUI();
});

// SET NAME
function setName() {
    const nameInput = document.getElementById("name");

    state.name = nameInput.value.trim();

    document.getElementById("teamLabel").style.display = "block";

    updatePreview();

    nameInput.value = "";
}

function setSelectedCard(card) {
    document.querySelectorAll(".charCard")
        .forEach(c => c.classList.remove("selected"));

    card.classList.add("selected");
    state.character = card.__charData;

    updatePreview();
}

function centerOnCard(card) {
    const container = document.getElementById("characters");

    const containerRect = container.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();

    const offset =
        (cardRect.left + cardRect.width / 2) -
        (containerRect.left + containerRect.width / 2);

    container.scrollBy({
        left: offset,
        behavior: "smooth"
    });
}

function updateCenterCard() {
    const container = document.getElementById("characters");
    const cards = container.querySelectorAll(".charCard");

    if (!cards.length) return;

    const containerCenter =
        container.getBoundingClientRect().left +
        container.offsetWidth / 2;

    let closest = null;
    let closestDistance = Infinity;
    
    cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const center = rect.left + rect.width / 2;

        const distance = Math.abs(center - containerCenter);

        if (distance < closestDistance) {
            closestDistance = distance;
            closest = card;
        }
    });

    cards.forEach(c => c.classList.remove("center"));

    if (closest) {
        closest.classList.add("center");
        currentIndex = realCards.indexOf(closest);
    }
}

function scrollByCard(direction) {
    if (!realCards.length) return;

    currentIndex += direction;

    if (currentIndex < 0) {
        currentIndex = realCards.length - 1;
    }

    if (currentIndex >= realCards.length) {
        currentIndex = 0;
    }

    const card = realCards[currentIndex];
    if (!card) return;

    centerOnCard(card);
}

function updateLockedUI() {
    document.querySelectorAll(".charCard").forEach(card => {
        const name = card.__charData.name.toLowerCase();

        if (lockedSet.has(name)) {
            card.classList.add("locked");
            card.style.opacity = "0.3";
            card.style.pointerEvents = "none";
            card.style.filter = "grayscale(1)";
        } else {
            card.classList.remove("locked");
            card.style.opacity = "";
            card.style.pointerEvents = "";
            card.style.filter = "";
        }
    });
}

// JOIN GAME - LOCK IN PLAYER
function joinGame() {
    if (!state.name) {
        alert("Please enter your team name first");
        return;
    }

    if (!state.character) {
        alert("Please choose a character");
        return;
    }

    const joinBtn = document.getElementById("joinBtn");
    joinBtn.disabled = true;
    joinBtn.innerText = "Joined!";
    joinBtn.style.opacity = "0.6";
    joinBtn.style.cursor = "not-allowed";

    confettiBurst();

    socket.emit("join", {
        name: state.name,
        character: state.character.name
    });

    // LOCK UI AFTER JOINING
    document.getElementById("name").disabled = true;

    document.querySelectorAll("#characters button")
    .forEach(b => {
        b.disabled = true;
        b.style.pointerEvents = "none";
    });

    // DISABLE BUTTONS AFTER JOINING
    document.getElementById("enterBtn").disabled = true;
}

// PREVIEW UPDATE
function updatePreview() {
    document.getElementById("previewName").textContent =
        state.name || "---";

    const img = document.getElementById("previewImage");
    //const text = document.getElementById("previewCharacterText");

    if (state.character) {
        img.src = state.character.front;
        img.style.display = "block";

        //text.textContent = state.character.name;
    } else {
        img.style.display = "none";
    }
}

function confettiBurst() {
    const images = [
        "/confetti/confetti1.png",
        "/confetti/confetti2.png"
    ];

    for (let i = 0; i < 50; i++) {
        const confetti = document.createElement("img");

        confetti.src = images[Math.floor(Math.random() * images.length)];

        confetti.style.position = "fixed";
        confetti.style.left = "50%";
        confetti.style.top = "40%";

        confetti.style.width = "36px";
        confetti.style.height = "36px";

        confetti.style.zIndex = "9999";
        confetti.style.pointerEvents = "none";

        // rainbow tint
        const hue = Math.floor(Math.random() * 360);
        confetti.style.filter = `hue-rotate(${hue}deg)`;

        document.body.appendChild(confetti);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 2 + Math.random() * 5;

        let x = 0;
        let y = 0;
        let gravity = 0;

        const interval = setInterval(() => {
            gravity += 0.15;

            x += Math.cos(angle) * velocity;
            y += Math.sin(angle) * velocity + gravity;

            confetti.style.transform = `translate(${x}px, ${y}px) rotate(${x * 2}deg)`;

            if (y > window.innerHeight) {
                clearInterval(interval);
                confetti.remove();
            }
        }, 16);
    }
}

updatePreview();

</script>

</body>
</html>
